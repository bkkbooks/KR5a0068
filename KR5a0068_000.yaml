body:
  text: 太上安鎮九壘龍神妙經太上元始天尊昔在洞陽天中召集十方聖衆俱來集㑹講說妙法時有真人端簡上告天尊曰爲見閻浮衆生修造宅舍之後頻遭厄難作何方便以救凡愚天尊曰善哉汝當諦聽於是天尊乃作空洞之音元始結炁混洞之中下成形兮盤礡㝠空地網直根内有靈真號曰土皇君受位於帝宸宫府三十六綱維統萬神金石相纒固機㑹緫崑崙虚涵溟渤津風澤常彌綸妙理宗靈寳厚徳堅无傾劫化周大數蛟龍俱負乗正道順自然妖奸何以興二儀通至用玄㑹保黃寧天尊告矣人曰若有善男子善女人起造宅舍驚動龍神屋宇鳴喚地華土裂南堂北屋東廊西戸井竈碓磨庫藏船車寓止六畜攔圈莊舍寺觀但是屋宇房廊窟穴觸犯天煞地煞年煞月煞日煞時煞四方諸煞五方地祗青龍白虎朱雀玄武將軍太歳黄旛豹尾十二時神六甲禁忌土公土母土府伏龍一切惡煞宜轉此經禳謝所犯神煞悉皆隱藏逺還四方各鎮方隅不敢爲害念誦此經是諸惡鬼皆自消滅疾病驅除身強體輕念誦此經功德无量若有善男善女匡保𧖟桑念誦此經福徳報應或起造屋宇掘鑿動土轉誦此經三遍至百遍令土府相生隂陽和合向坐宜良龍神匡賛百福咸臻眷屬和平悉无障礙所求皆得所願皆成於是真人聖衆聞說此經皆大歡喜作禮而退敬奉傳行太上安鎮九壘龍神妙經終
